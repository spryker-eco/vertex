# yaml-language-server: $schema=../../../../../src/Spryker/Configuration/resources/configuration/configuration-schema-v1.json
features:
    - key: integrations
      name: Integrations
      description: Third-party integrations configuration.
      enabled: true
      order: 100
      tabs:
          - key: vertex
            name: Vertex
            description: Vertex tax calculation integration.
            enabled: true
            order: 10
            groups:
                - key: configurations
                  name: Configuration
                  description: Enter the connection details from your Vertex account.
                  enabled: true
                  order: 1
                  scopes:
                      - global
                  settings:
                      - key: security_uri
                        name: Security URI
                        description: Vertex OAuth security endpoint used to obtain access tokens.
                        placeholder: https://auth.vertexsmb.com/
                        type: string
                        enabled: true
                        secret: false
                        storefront: false
                        order: 0
                        default_value: ''
                        scopes:
                            - global
                        constraints:
                            - type: required
                              message: Security URI is required.
                            - type: url
                              message: Please enter a valid URL.
                      - key: transaction_calls_uri
                        name: Transaction calls URI
                        description: Vertex transaction calls endpoint used for tax calculations.
                        placeholder: https://api.vertexsmb.com/
                        type: string
                        enabled: true
                        secret: false
                        storefront: false
                        order: 1
                        default_value: ''
                        scopes:
                            - global
                        constraints:
                            - type: required
                              message: Transaction calls URI is required.
                            - type: url
                              message: Please enter a valid URL.
                      - key: client_id
                        name: Client ID
                        description: OAuth client ID for the Vertex API.
                        placeholder: Your Vertex client ID
                        type: string
                        enabled: true
                        secret: true
                        storefront: false
                        order: 2
                        default_value: ''
                        scopes:
                            - global
                        constraints:
                            - type: required
                              message: Client ID is required.
                      - key: client_secret
                        name: Client secret
                        description: OAuth client secret for the Vertex API.
                        placeholder: Your Vertex client secret
                        type: string
                        enabled: true
                        secret: true
                        storefront: false
                        order: 3
                        default_value: ''
                        scopes:
                            - global
                        constraints:
                            - type: required
                              message: Client secret is required.
                      - key: default_taxpayer_company_code
                        name: Default taxpayer company code
                        description: "The company code you set in your Vertex account, used to identify your organization in tax calculations."
                        placeholder: For example, MAIN
                        type: string
                        enabled: true
                        secret: false
                        storefront: false
                        order: 4
                        default_value: ''
                        scopes:
                            - global

                - key: taxamo
                  name: Tax ID validation (Taxamo)
                  description: Configure Taxamo to validate customer tax IDs.
                  enabled: true
                  order: 2
                  scopes:
                      - global
                  settings:
                      - key: taxamo_api_url
                        name: Vertex Validator (Taxamo) API URL
                        description: The Vertex Validator (Taxamo) API URL used for tax ID validation.
                        placeholder: https://api.taxamo.com/
                        note: Used only when Tax ID validator is enabled.
                        type: string
                        enabled: true
                        secret: false
                        storefront: false
                        order: 0
                        default_value: ''
                        scopes:
                            - global
                      - key: taxamo_token
                        name: Taxamo token
                        description: The Taxamo API token used for authentication.
                        placeholder: Your Taxamo API token
                        note: Used only when Tax ID validator is enabled.
                        type: string
                        enabled: true
                        secret: true
                        storefront: false
                        order: 1
                        default_value: ''
                        scopes:
                            - global

                - key: invoicing
                  name: Invoicing
                  enabled: true
                  order: 3
                  scopes:
                      - global
                  settings:
                      - key: is_invoicing_enabled
                        name: Enable Invoice Save in Vertex
                        description: Allow tax invoices to be viewed and reported in the Vertex dashboard
                        type: boolean
                        enabled: true
                        secret: false
                        storefront: false
                        order: 0
                        default_value: false
                        scopes:
                            - global

                - key: tax_assist
                  name: Tax Assist
                  enabled: true
                  order: 4
                  scopes:
                      - global
                  settings:
                      - key: is_tax_assist_enabled
                        name: Enable Tax Assist in Vertex
                        description: Return Assisted Parameters in the Vertex dashboard
                        type: boolean
                        enabled: true
                        secret: false
                        storefront: false
                        order: 0
                        default_value: false
                        scopes:
                            - global

    - key: taxes
      name: Taxes
      description: Tax calculation configuration.
      enabled: true
      order: 40
      tabs:
          - key: tax_provider
            name: Tax Provider
            description: Select the service used to calculate taxes.
            enabled: true
            order: 0
            groups:
                - key: provider
                  name: Tax Provider
                  description: "Selecting Vertex requires credentials configured under Integrations > Vertex."
                  enabled: true
                  order: 0
                  scopes:
                      - global
                  settings:
                      - key: tax_provider
                        name: Tax provider
                        description: Select which service calculates taxes for orders.
                        type: radio
                        enabled: true
                        secret: false
                        storefront: false
                        order: 0
                        default_value: spryker
                        scopes:
                            - global
                        options:
                            - value: spryker
                              label: Default (Spryker)
                              description: Use the built-in Spryker tax rates.
                            - value: vertex
                              label: Vertex
                              description: "Use Vertex for tax calculation. Ensure Vertex credentials are configured and the integration is active."
